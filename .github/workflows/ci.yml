name: CI

on:
  push:
    branches: ["main", "feature/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs on the same branch/PR when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Backend lint ──────────────────────────────────────────────────────────
  backend-lint:
    name: "Backend — Lint (ruff)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Lint
        run: ruff check app/ tests/

      - name: Format check
        run: ruff format --check app/ tests/

  # ── 2. Backend unit + integration tests ─────────────────────────────────────
  backend-test:
    name: "Backend — Tests (pytest)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── 3. Backend SAST — bandit ─────────────────────────────────────────────────
  backend-sast:
    name: "Backend — SAST (bandit)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install "bandit[toml]>=1.7.0"

      - name: Run bandit (medium+ severity)
        # -ll = medium and above; -ii = high confidence only would be -iii
        # Skips B404 (import subprocess) via pyproject.toml [tool.bandit].
        run: bandit -r app/ -ll -c pyproject.toml

  # ── 4. Dependency vulnerability scan — pip-audit ────────────────────────────
  backend-dep-scan:
    name: "Backend — Dependency Scan (pip-audit)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install "pip-audit>=2.7.0"

      - name: Scan dependencies
        run: pip-audit -r requirements.txt

  # ── 5. Filesystem security scan — Trivy ─────────────────────────────────────
  trivy-scan:
    name: "Security — Filesystem Scan (trivy)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table

  # ── 6. Frontend build + lint ─────────────────────────────────────────────────
  frontend-build:
    name: "Frontend — Build + Lint (ESLint)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ── 7. Docker Compose build check ───────────────────────────────────────────
  docker-build:
    name: "Docker — Compose Build"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build --no-cache
