[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# E/W: pycodestyle  F: pyflakes  I: isort  UP: pyupgrade
select = ["E", "W", "F", "I", "UP"]
ignore = [
    "E501",   # line too long — handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["F811"]   # redefinition of unused name (fixtures)

[tool.bandit]
skips = ["B404"]        # import-subprocess: informational only, always fired when subprocess is used
